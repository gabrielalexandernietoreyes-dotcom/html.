<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/281/281769.png" type="image/x-icon">
    <title>QuickMail | Correo Temporal con Lectura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .modal-active { overflow: hidden; }
        .loading { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>

<body class="bg-[#0f172a] text-slate-200 min-h-screen flex flex-col items-center p-4 md:p-10">

    <header class="mb-10 text-center">
        <h1 class="text-4xl font-extrabold text-blue-500 mb-2">⚡Tu Correo temporal</h1>
        <p class="text-slate-400">Genera, recibe y lee tus correos al instante.</p>
    </header>

    <main class="w-full max-w-2xl bg-[#1e293b] rounded-2xl p-6 md:p-8 shadow-2xl border border-slate-700">
        
        <div class="flex flex-col gap-4 mb-8">
            <div class="flex justify-between items-center">
                <label class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Tu dirección:</label>
                <span id="timer" class="text-xs text-orange-400 font-mono">Expira en: 60:00</span>
            </div>
            
            <div class="flex flex-col md:flex-row gap-3">
                <div id="email-display" class="flex-1 bg-[#0f172a] p-4 rounded-xl text-lg font-mono text-green-400 border border-slate-700 break-all flex items-center justify-center min-h-[60px]">
                    <span class="loading">Cargando...</span>
                </div>
                
                <div class="flex gap-2">
                    <button onclick="copiarCorreo()" class="bg-slate-700 hover:bg-slate-600 text-white px-5 py-4 rounded-xl font-bold transition-all flex items-center justify-center gap-2">
                        📋 <span>Copiar</span>
                    </button>
                    <button onclick="generarNuevoManual()" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-4 rounded-xl font-bold transition-all flex items-center justify-center gap-2">
                        🔄 <span>Nuevo</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <div class="flex justify-between items-center border-b border-slate-700 pb-3">
                <div class="flex items-center gap-2">
                    <h2 class="text-xl font-bold text-white">Bandeja de Entrada</h2>
                    <button onclick="refrescarManual()" id="btn-refrescar" class="text-slate-500 hover:text-blue-400 transition-all p-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.00
